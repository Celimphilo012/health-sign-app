name: health_sign_app
description: Healthcare Sign Language Communication App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Camera
  camera: ^0.11.0+2
  permission_handler: ^11.3.1

  # Speech & TTS
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Utils
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  intl: ^0.19.0

  # ML / TFLite
  tflite_flutter: ^0.10.4
  google_mlkit_pose_detection: ^0.14.1
  google_mlkit_commons: ^0.11.1

  # Image processing
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/models/
